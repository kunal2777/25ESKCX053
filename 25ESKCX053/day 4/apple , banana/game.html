<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fruit Counter</title>
<link rel="stylesheet" href="game.css">
</head>
<body>

<h1>Fruit Clicker</h1>
<button id="submitBtn">Submit</button>

<div class="fruits-container" id="fruitsContainer">
  <div class="fruit-box" id="bananaBox">
    <div class="fruit-emoji">🍌</div>
    <div class="fruit-name">Banana</div>
    <div class="fruit-count">Count: <span id="bananaCount">0</span></div>
  </div>

  <div class="fruit-box" id="appleBox">
    <div class="fruit-emoji">🍎</div>
    <div class="fruit-name">Apple</div>
    <div class="fruit-count">Count: <span id="appleCount">0</span></div>
  </div>
  <button onclick="reserScore()">Reset</button>
</div>

<script src="game.js">
  
</script>

</body>
</html>
